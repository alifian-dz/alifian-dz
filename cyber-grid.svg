<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .text-title { fill: #00FF66; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; letter-spacing: 2px;}
      .text-sub { fill: #C9D1D9; font-family: 'Courier New', monospace; font-size: 10px; }
      
      .cell { width: 14px; height: 14px; rx: 3px; ry: 3px; stroke: #21262d; stroke-width: 1; }
      .empty { fill: #161b22; }
      
      /* KEYFRAMES: CYBERPUNK GLOW ANIMATIONS */
      @keyframes pulse-high {
        0%, 100% { fill: #39d353; filter: drop-shadow(0 0 8px #39d353); opacity: 1; }
        50% { fill: #26a641; filter: drop-shadow(0 0 2px #26a641); opacity: 0.7; }
      }
      @keyframes pulse-mid {
        0%, 100% { fill: #006d32; opacity: 0.6; }
        50% { fill: #26a641; filter: drop-shadow(0 0 5px #26a641); opacity: 1; }
      }
      @keyframes glitch {
        0%, 90%, 100% { fill: #39d353; filter: drop-shadow(0 0 4px #39d353); }
        92%, 96% { fill: #FF003C; filter: drop-shadow(0 0 10px #FF003C); }
      }

      /* CSS CLASSES BINDING */
      .high { animation: pulse-high 2s ease-in-out infinite; }
      .mid { animation: pulse-mid 3s ease-in-out infinite alternate; }
      .glitch { animation: glitch 4s infinite; }
      .high-delay { animation: pulse-high 2.5s ease-in-out infinite 1s; }
      .mid-delay { animation: pulse-mid 3.5s ease-in-out infinite 0.5s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="10"/>
  
  <!-- Terminal Text -->
  <text x="30" y="35" class="text-title">SYSTEM_CONTRIBUTION_NODE</text>
  <text x="650" y="35" class="text-title" style="fill:#FF003C;">[LIVE]</text>

  <!-- Matrix Grid Offset -->
  <g transform="translate(30, 60)">
    
    <!-- ROW 1 (Monday) -->
    <rect x="0" y="0" class="cell empty" />
    <rect x="20" y="0" class="cell empty" />
    <rect x="40" y="0" class="cell empty" />
    <rect x="60" y="0" class="cell high" />
    <rect x="80" y="0" class="cell mid" />
    <rect x="100" y="0" class="cell empty" />
    <rect x="120" y="0" class="cell glitch" />
    <rect x="140" y="0" class="cell empty" />
    <rect x="160" y="0" class="cell high-delay" />
    <rect x="180" y="0" class="cell empty" />
    <rect x="200" y="0" class="cell mid-delay" />
    <rect x="220" y="0" class="cell empty" />
    
    <!-- ROW 2 (Tuesday) -->
    <rect x="0" y="20" class="cell empty" />
    <rect x="20" y="20" class="cell mid" />
    <rect x="40" y="20" class="cell high" />
    <rect x="60" y="20" class="cell high-delay" />
    <rect x="80" y="20" class="cell empty" />
    <rect x="100" y="20" class="cell empty" />
    <rect x="120" y="20" class="cell high" />
    <rect x="140" y="20" class="cell mid-delay" />
    <rect x="160" y="20" class="cell empty" />
    <rect x="180" y="20" class="cell mid" />
    <rect x="200" y="20" class="cell glitch" />
    <rect x="220" y="20" class="cell high" />

    <!-- ROW 3 (Wednesday) -->
    <rect x="0" y="40" class="cell mid" />
    <rect x="20" y="40" class="cell empty" />
    <rect x="40" y="40" class="cell mid-delay" />
    <rect x="60" y="40" class="cell empty" />
    <rect x="80" y="40" class="cell glitch" />
    <rect x="100" y="40" class="cell high" />
    <rect x="120" y="40" class="cell mid" />
    <rect x="140" y="40" class="cell empty" />
    <rect x="160" y="40" class="cell empty" />
    <rect x="180" y="40" class="cell high-delay" />
    <rect x="200" y="40" class="cell mid" />
    <rect x="220" y="40" class="cell empty" />

    <!-- ROW 4 (Thursday) -->
    <rect x="0" y="60" class="cell high-delay" />
    <rect x="20" y="60" class="cell mid" />
    <rect x="40" y="60" class="cell empty" />
    <rect x="60" y="60" class="cell empty" />
    <rect x="80" y="60" class="cell high" />
    <rect x="100" y="60" class="cell mid" />
    <rect x="120" y="60" class="cell empty" />
    <rect x="140" y="60" class="cell glitch" />
    <rect x="160" y="60" class="cell high-delay" />
    <rect x="180" y="60" class="cell mid" />
    <rect x="200" y="60" class="cell empty" />
    <rect x="220" y="60" class="cell mid-delay" />

    <!-- ROW 5 (Friday) -->
    <rect x="0" y="80" class="cell empty" />
    <rect x="20" y="80" class="cell high" />
    <rect x="40" y="80" class="cell glitch" />
    <rect x="60" y="80" class="cell mid-delay" />
    <rect x="80" y="80" class="cell empty" />
    <rect x="100" y="80" class="cell empty" />
    <rect x="120" y="80" class="cell mid" />
    <rect x="140" y="80" class="cell high" />
    <rect x="160" y="80" class="cell empty" />
    <rect x="180" y="80" class="cell empty" />
    <rect x="200" y="80" class="cell high-delay" />
    <rect x="220" y="80" class="cell high" />
  </g>

  <!-- Legend -->
  <text x="30" y="190" class="text-sub">LESS</text>
  <rect x="70" y="181" class="cell empty" />
  <rect x="90" y="181" class="cell mid-delay" />
  <rect x="110" y="181" class="cell mid" />
  <rect x="130" y="181" class="cell high" />
  <text x="155" y="190" class="text-sub">MORE</text>
  <text x="210" y="190" class="text-sub" style="fill:#FF003C; font-weight:bold;">[!] GLITCH ANOMALY DETECTED</text>
</svg>
